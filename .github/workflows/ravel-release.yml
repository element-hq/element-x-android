name: Build and Release Ravel APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC -Dkotlin.daemon.jvm.options=-Xmx4g

jobs:
  build:
    name: Build and sign APKs (FDroid flavor)
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject version from git tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v', e.g. v0.1.1 -> 0.1.1
          MAJOR=$(echo $TAG | cut -d. -f1)
          MINOR=$(echo $TAG | cut -d. -f2)
          PATCH=$(echo $TAG | cut -d. -f3)
          sed -i "s/^private const val versionMajor = .*/private const val versionMajor = $MAJOR/" plugins/src/main/kotlin/Versions.kt
          sed -i "s/^private const val versionMinor = .*/private const val versionMinor = $MINOR/" plugins/src/main/kotlin/Versions.kt
          sed -i "s/^private const val versionPatch = .*/private const val versionPatch = $PATCH/" plugins/src/main/kotlin/Versions.kt
          echo "Injected version $MAJOR.$MINOR.$PATCH"

      - name: Build APKs
        run: ./gradlew assembleFdroidRelease --stacktrace --no-daemon --no-configuration-cache

      - name: Sign APKs
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: app/build/outputs/apk/fdroid/release
          signingKeyBase64: ${{ secrets.RAVEL_KEYSTORE_BASE64 }}
          alias: ${{ secrets.RAVEL_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RAVEL_STORE_PASSWORD }}
          keyPassword: ${{ secrets.RAVEL_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0"

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ravel-apks-${{ github.ref_name }}
          path: app/build/outputs/apk/fdroid/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/fdroid/release/*.apk
          generate_release_notes: true
